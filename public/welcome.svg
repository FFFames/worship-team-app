<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#1b211f"/>
      <stop offset="55%" stop-color="#0d100f"/>
      <stop offset="100%" stop-color="#050606"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#3ecf8e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emblem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eafff4"/>
      <stop offset="100%" stop-color="#3ecf8e"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- soft halo behind emblem -->
  <circle cx="960" cy="420" r="380" fill="url(#glow)"/>

  <!-- emblem: cross + music note -->
  <g transform="translate(960 420)">
    <!-- subtle blurred glow of the cross -->
    <g filter="url(#soft)" opacity="0.55">
      <rect x="-15" y="-160" width="30" height="320" rx="8" fill="#3ecf8e"/>
      <rect x="-96" y="-44" width="192" height="30" rx="8" fill="#3ecf8e"/>
    </g>
    <!-- cross -->
    <rect x="-14" y="-150" width="28" height="300" rx="6" fill="url(#emblem)"/>
    <rect x="-90" y="-40" width="180" height="28" rx="6" fill="url(#emblem)"/>
    <!-- music note (eighth note) -->
    <g transform="translate(74 66)">
      <rect x="-8" y="-132" width="16" height="118" rx="4" fill="#eafff4"/>
      <ellipse cx="0" cy="-8" rx="34" ry="26" fill="#eafff4"/>
      <path d="M 8 -132 Q 64 -112 52 -58" stroke="#eafff4" stroke-width="14" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Welcome -->
  <text x="960" y="788" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="136" font-weight="300" letter-spacing="14"
        fill="#f4fbf7">Welcome</text>

  <!-- subtitle -->
  <text x="960" y="884" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="36" letter-spacing="9"
        fill="#7fae98">PLEASE STAND BY</text>
</svg>
